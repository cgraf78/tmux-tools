name: Tests

on:
  pull_request:
  push:
    branches: [master, main]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    uses: cgraf78/actions/.github/workflows/shell-ci.yml@7d88c3afa6e51a83e9cfefb0c12f503155e17952
    with:
      profiles: base,shellcheck,tmux
      test-command: test/run
